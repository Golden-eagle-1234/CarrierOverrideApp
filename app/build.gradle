plugins {
    id 'com.android.application'
}

android {
    namespace 'com.custom.carrieroverride'
    compileSdk 34

    defaultConfig {
        applicationId "com.custom.carrieroverride"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    // XposedBridge API - compileOnly so it's not bundled in APK
    compileOnly 'de.robv.android.xposed:api:82'
}
